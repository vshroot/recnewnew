<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CSV Reconciler</title>

  <link rel="stylesheet" href="./styles.css?v=5.0.7"/>

  <!-- PapaParse (used on main thread only for header preview / column lists) -->
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- App (worker-first: worker.js is NOT loaded as a <script>) -->
  <script defer src="./app.js?v=5.0.7"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brandTitle">CSV Reconciler</div>
      <div class="brandSub muted">worker-first</div>
    </div>

    <div class="topActions">
      <button id="viewsBtn" class="ghost" type="button">Views</button>
      <button id="colsBtn" class="ghost" type="button">Settings</button>

      <!-- Safari/GitHub Pages-safe file picker: native label -> input -->
      <label id="addFileBtn" class="ghost" for="filePicker" role="button" tabindex="0">Add file</label>
      <button id="runBtn" class="primary" type="button">Run</button>
    </div>
  </header>

  <section class="toolbar">
    <div class="toolGroup">
      <label class="muted small" for="tolerance">Tolerance</label>
      <input id="tolerance" class="mono" type="number" value="0.01" min="0" step="any" />
      <div class="muted small">abs(base - other) ≤ tolerance</div>
    </div>

    <div class="toolGroup">
      <label class="muted small" for="csvDelimiterGlobal">Default CSV delimiter</label>
      <select id="csvDelimiterGlobal" class="mono">
        <option value="">Auto</option>
        <option value=",">Comma (,)</option>
        <option value=";">Semicolon (;)</option>
        <option value="\t">Tab (\t)</option>
        <option value="|">Pipe (|)</option>
      </select>
      <div class="muted small">Per-file override below</div>
    </div>

    <div class="toolGroup">
      <label class="muted small" for="keepColsGlobal">Keep columns (optional)</label>
      <input id="keepColsGlobal" class="mono" placeholder="colA, colB, colC" />
      <div class="muted small">Copied into reports</div>
    </div>

    <div class="toolGroup grow">
      <label class="muted small" for="globalTxidSearch">Global txid search</label>
      <div class="row">
        <input id="globalTxidSearch" class="mono grow" placeholder="Search txid across all pairs…" />
        <button id="globalTxidClear" class="ghost" type="button">Clear</button>
      </div>
    </div>
  </section>

  <div id="bannerHost" class="bannerHost"></div>
  <div id="perfBar" class="perfBar" hidden></div>

  <main class="main">
    <section class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Files</div>
        <div class="muted small">Add ≥2 CSV files • Pick PRIMARY • Choose columns per file</div>
      </div>
      <div id="files"></div>
    </section>

    <section id="progress" class="panel" hidden>
      <div class="panelHeader">
        <div class="panelTitle">Progress</div>
      </div>
      <div class="progressWrap">
        <div class="progressBarTrack"><div id="progressBar"></div></div>
        <div id="progressText" class="muted small">Working…</div>
      </div>
    </section>

    <section class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Results</div>
        <div class="muted small">Expand a report to see rows • Click a row for details</div>
      </div>
      <div id="results"></div>
    </section>
  </main>

  <aside id="detailsPanel" class="detailsPanel" hidden>
    <div class="detailsHeader">
      <div class="detailsTitle">Details</div>
      <div class="detailsBtns">
        <button id="detailsCopyTxidBtn" class="ghost small" type="button">Copy txid</button>
        <button id="detailsCloseBtn" class="ghost small" type="button">Close</button>
      </div>
    </div>
    <div id="detailsBody" class="detailsBody"></div>
  </aside>

  <div id="modalBackdrop" class="modalBackdrop" hidden>
    <div id="modal" class="modal" hidden>
      <div class="modalHead">
        <div id="modalTitle" class="modalTitle"></div>
        <button id="modalClose" class="ghost small" type="button">✕</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
      <div id="modalFoot" class="modalFoot"></div>
    </div>
  </div>

  <!-- Required by Add file label -->
  <input id="filePicker" type="file" accept=".csv,text/csv" hidden />
</body>
</html>
